# Work Buddy - Global Configuration
# Switch mode to "live" when connecting to real services

mode: mock
log_level: INFO
structured_logging: false

# Mock server URLs (used when mode: mock)
mock_jira_url: "http://localhost:8081"
mock_confluence_url: "http://localhost:8082"
mock_sso_url: "http://localhost:8090"

# LLM settings
# Supported providers: openai, dashscope (Qwen)
# For OpenAI: set OPENAI_API_KEY env var
# For DashScope/Qwen: set DASHSCOPE_API_KEY env var
llm_provider: dashscope
# For OpenAI: gpt-4o, gpt-4-turbo, gpt-3.5-turbo
# For DashScope: qwen-turbo, qwen-plus, qwen-max
llm_model: qwen-plus

# Evidence storage
evidence_dir: evidence
screenshots_dir: screenshots
